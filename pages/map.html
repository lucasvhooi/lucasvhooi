<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map — DnD Campaign</title>
  <link rel="icon" type="image/webp" href="../Images/EssolisLogoWeb.webp" />
  <meta property="og:image" content="../Images/EssolisLogoWeb.webp" />
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/map.css">
</head>
<body class="map-page">
  <nav>
    <img src="../Images/EssolisLogo.webp" alt="Essolis Logo" class="nav-logo">
    <ul>
      <li><a href="missions.html">Missions</a></li>
      <li><a href="exploration.html">Characters</a></li>
      <li class="nav-dm-only"><a href="items.html">Items</a></li>
      <li><a href="map.html">Map</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li class="nav-dm-only"><a href="combat.html">Combat</a></li>
      <li><a href="inventory.html">Inventory</a></li>
    </ul>
  </nav>

  <div id="map-container">
    <div id="map-wrapper">
      <img id="map-image" src="../Images/Maps/map.webp" alt="Map">
      <div id="marker-layer"></div>
    </div>

    <!-- DM Toolbar (shown via JS if admin) -->
    <div id="dm-toolbar">
      <span class="dm-label">DM Tools</span>
      <button id="btn-place-marker" class="dm-btn">Place Marker</button>
    </div>

    <!-- Location list panel toggle (always visible) -->
    <button id="lp-open-btn" class="lp-open-btn" title="Open location list">&#9776; Locations</button>

    <!-- Location list panel -->
    <div id="location-panel" class="location-panel">
      <div id="lp-resize-handle" class="lp-resize-handle" title="Drag to resize"></div>
      <div class="lp-header">
        <span class="lp-title">&#128205; Locations</span>
        <div class="lp-header-actions">
          <button id="lp-add-country-btn" class="lp-hdr-btn" title="Add country" style="display:none">&#43; Country</button>
          <button id="lp-close-btn" class="lp-hdr-btn lp-hdr-close" title="Close">&times;</button>
        </div>
      </div>
      <div class="lp-search-row">
        <input type="text" id="lp-search" class="lp-search-input" placeholder="&#128269; Search locations…" />
      </div>
      <div class="lp-body" id="lp-body"></div>
    </div>
  </div>

  <!-- Marker Form Modal -->
  <div id="marker-modal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modal-title">Place Marker</h2>
      <div class="form-row">
        <label>Name <span class="required">*</span>
          <input type="text" id="m-name" placeholder="e.g. Frostholm" />
        </label>
      </div>
      <div class="form-row" id="m-country-row">
        <label>Country / Region
          <select id="m-country">
            <option value="">— None —</option>
          </select>
        </label>
      </div>
      <div class="form-row">
        <label>Type
          <select id="m-type">
            <option value="City">City</option>
            <option value="Town">Town</option>
            <option value="Village">Village</option>
            <option value="Dungeon">Dungeon</option>
            <option value="Landmark">Landmark</option>
            <option value="Cave">Cave</option>
            <option value="Ruin">Ruin</option>
            <option value="Other">Other</option>
          </select>
        </label>
      </div>
      <div class="form-row two-col">
        <label>Population
          <input type="text" id="m-population" placeholder="e.g. 5.7K" />
        </label>
        <label>Wealth
          <input type="text" id="m-wealth" placeholder="e.g. High" />
        </label>
      </div>
      <div class="form-row two-col">
        <label>Main Race
          <select id="m-main-race">
            <option value="">— Mixed —</option>
            <option value="Human">Human</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Halfling">Halfling</option>
            <option value="Gnome">Gnome</option>
            <option value="Half-Orc">Half-Orc</option>
            <option value="Tiefling">Tiefling</option>
            <option value="Dragonborn">Dragonborn</option>
            <option value="Half-Elf">Half-Elf</option>
          </select>
        </label>
        <label>Religion
          <input type="text" id="m-religion" placeholder="e.g. Pelor" />
        </label>
      </div>
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="m-explored" />
          <span class="checkbox-box"></span>
          Explored
          <span class="checkbox-hint">(yellow = explored, red = unexplored)</span>
        </label>
      </div>
      <div class="form-row">
        <label>DM Notes <span class="dm-only">(only you see this)</span>
          <textarea id="m-notes" placeholder="Secret notes, plot hooks, etc."></textarea>
        </label>
      </div>
      <div id="modal-error" class="modal-error"></div>
      <div class="modal-actions">
        <button id="m-save" class="dm-btn">Save Marker</button>
        <button id="m-cancel" class="dm-btn dm-btn-secondary">Cancel</button>
      </div>
    </div>
  </div>


  <!-- Add / Edit Country modal -->
  <div id="country-modal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="cm-modal-title">Add Country</h2>
      <div class="form-row">
        <label>Name <span class="required">*</span>
          <input type="text" id="cm-name" placeholder="e.g. The Ferrath Empire" />
        </label>
      </div>
      <div class="form-row">
        <label>Colour</label>
        <div class="country-color-row" id="cm-color-swatches"></div>
      </div>
      <div class="form-row">
        <label>Description <span class="dm-only">(optional)</span>
          <textarea id="cm-desc" rows="3" placeholder="Brief notes about this region…"></textarea>
        </label>
      </div>
      <div id="cm-error" class="modal-error"></div>
      <div class="modal-actions">
        <button id="cm-save" class="dm-btn">Save</button>
        <button id="cm-cancel" class="dm-btn dm-btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

<script type="module" src="../assets/js/map.js"></script>
  <script src="../assets/js/base.js"></script>
</body>
</html>
