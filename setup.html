<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="icon" type="image/webp" href="Images/EssolisLogoWeb.webp" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #120d07;
      color: #d4b483;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Loading screen ── */
    #screen-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loading-logo {
      width: 52px;
      height: 52px;
      filter: brightness(0) saturate(100%) invert(84%) sepia(63%) saturate(600%) hue-rotate(315deg) brightness(108%);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1);    }
      50%       { opacity: 0.5; transform: scale(1.06); }
    }
    .loading-text { color: #555; font-size: 13px; }

    /* ── Setup card ── */
    #screen-setup { display: none; width: 100%; max-width: 420px; }

    .setup-card {
      background: linear-gradient(160deg, #1e1108 0%, #150d05 100%);
      border: 1px solid #3a2510;
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
      animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .setup-logo {
      display: block;
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      filter: brightness(0) saturate(100%) invert(84%) sepia(63%) saturate(600%) hue-rotate(315deg) brightness(108%);
    }

    .setup-title {
      font-family: 'IM Fell English', 'Garamond', serif;
      font-size: 1.6rem;
      color: #c8a45c;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .setup-sub {
      text-align: center;
      color: #666;
      font-size: 12px;
      font-style: italic;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #3a2510;
      border-radius: 8px;
      color: #ccc;
      font-size: 14px;
      font-family: 'Georgia', serif;
      padding: 11px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 4px;
    }
    .btn-google:hover { background: rgba(255,255,255,0.09); border-color: #555; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }

    .divider-or {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: #444;
      font-size: 12px;
    }
    .divider-or::before, .divider-or::after {
      content: '';
      flex: 1;
      border-top: 1px solid #2a1a08;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid #3a2510;
      border-radius: 8px;
      padding: 11px 14px;
      color: #d4b483;
      font-size: 15px;
      font-family: 'Georgia', serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #c8a45c; }
    .field-hint { display: block; font-size: 11px; color: #555; margin-top: 5px; font-style: italic; }

    .divider-line {
      border: none;
      border-top: 1px solid #2a1a08;
      margin: 20px 0;
    }

    .btn-setup {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, #4a2c0a 0%, #6b3e10 100%);
      border: 1px solid #c8a45c;
      border-radius: 8px;
      color: #c8a45c;
      font-family: 'IM Fell English', 'Garamond', serif;
      font-size: 16px;
      letter-spacing: 0.07em;
      padding: 13px;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
    }
    .btn-setup:hover {
      background: linear-gradient(135deg, #5a380f 0%, #7a4a18 100%);
      box-shadow: 0 0 20px rgba(200,164,92,0.25);
      transform: translateY(-1px);
    }
    .btn-setup:active  { transform: translateY(0) scale(0.98); }
    .btn-setup:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .setup-error {
      background: rgba(200,50,50,0.12);
      border: 1px solid rgba(200,50,50,0.3);
      border-radius: 6px;
      color: #e07070;
      font-size: 13px;
      padding: 9px 12px;
      margin-top: 14px;
      display: none;
    }
    .setup-error.show { display: block; }

    .setup-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }
    .setup-footer a { color: #c8a45c; text-decoration: none; }
    .setup-footer a:hover { text-decoration: underline; }

    /* ── Done screen ── */
    #screen-done {
      display: none;
      text-align: center;
      max-width: 360px;
    }
    .done-icon { font-size: 3rem; margin-bottom: 16px; }
    .done-title {
      font-family: 'IM Fell English', 'Garamond', serif;
      font-size: 1.5rem;
      color: #c8a45c;
      margin-bottom: 8px;
    }
    .done-sub { color: #666; font-size: 13px; line-height: 1.6; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading -->
  <div id="screen-loading">
    <img class="loading-logo" src="Images/EssolisLogo.webp" alt="">
    <span class="loading-text">Loading…</span>
  </div>

  <!-- Setup form -->
  <div id="screen-setup">
    <div class="setup-card">
      <img class="setup-logo" src="Images/EssolisLogo.webp" alt="">
      <h1 class="setup-title">Join the Realm</h1>
      <p class="setup-sub">Create your account to begin your adventure.</p>

      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.2-17.7 10.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36.5 24 36.5c-5.2 0-9.6-3.5-11.2-8.2l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.8l6.2 5.2C41.2 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider-or">or</div>

      <div class="field">
        <label for="s-email">Email</label>
        <input id="s-email" type="email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="s-name">Username</label>
        <input id="s-name" type="text" placeholder="adventurer_of_doom" autocomplete="off" maxlength="30" />
        <span class="field-hint">Shown to other players. No spaces.</span>
      </div>

      <hr class="divider-line">

      <div class="field">
        <label for="s-pass">Password</label>
        <input id="s-pass" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="s-pass2">Confirm Password</label>
        <input id="s-pass2" type="password" placeholder="Repeat password" autocomplete="new-password" />
      </div>

      <button class="btn-setup" id="btn-setup">Create Account</button>
      <div class="setup-error" id="setup-error"></div>

      <p class="setup-footer">Already have an account? <a href="pages/login.html">Sign in</a></p>
    </div>
  </div>

  <!-- Done -->
  <div id="screen-done">
    <div class="done-icon">⚔️</div>
    <h2 class="done-title">Welcome, Adventurer</h2>
    <p class="done-sub">Your account has been created.<br>Redirecting you to the app…</p>
  </div>

  <script type="module">
    import { auth, db }                                              from "./assets/js/firebase.js";
    import { createUserWithEmailAndPassword, GoogleAuthProvider,
             signInWithPopup }                                       from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { ref, set }                                              from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
    import { saveSession, getSession }                               from "./assets/js/auth.js";

    const screenLoading = document.getElementById('screen-loading');
    const screenSetup   = document.getElementById('screen-setup');
    const screenDone    = document.getElementById('screen-done');
    const errEl         = document.getElementById('setup-error');

    if (getSession()) {
      window.location.href = 'pages/login.html';
    } else {
      screenLoading.style.display = 'none';
      screenSetup.style.display   = 'block';
    }

    // ── Random colour ─────────────────────────────────────────────────────────
    function randomColor() {
      const h = Math.floor(Math.random() * 360);
      const s = 55 + Math.floor(Math.random() * 25);
      const l = 55 + Math.floor(Math.random() * 15);
      return hslToHex(h, s, l);
    }
    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => { const k = (n + h / 30) % 12; return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1))).toString(16).padStart(2, '0'); };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    // ── Google sign-up ────────────────────────────────────────────────────────
    const btnGoogle = document.getElementById('btn-google');
    btnGoogle.addEventListener('click', async () => {
      errEl.classList.remove('show');
      btnGoogle.disabled = true;
      btnGoogle.textContent = 'Signing in…';
      try {
        const cred = await signInWithPopup(auth, new GoogleAuthProvider());
        const uid  = cred.user.uid;
        const color = randomColor();
        const profile = { username: cred.user.displayName || 'Adventurer', role: 'player', color };
        await set(ref(db, `users/${uid}`), profile);
        saveSession({ id: uid, ...profile });
        showDone();
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') showErr('Google sign-in failed. Please try again.');
      } finally {
        btnGoogle.disabled = false;
        btnGoogle.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.2-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36.5 24 36.5c-5.2 0-9.6-3.5-11.2-8.2l-6.5 5C9.7 39.7 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.8l6.2 5.2C41.2 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg> Continue with Google`;
      }
    });

    // ── Email / password sign-up ──────────────────────────────────────────────
    const btn = document.getElementById('btn-setup');
    btn.addEventListener('click', async () => {
      errEl.classList.remove('show');

      const email = document.getElementById('s-email').value.trim();
      const name  = document.getElementById('s-name').value.trim();
      const pass  = document.getElementById('s-pass').value;
      const pass2 = document.getElementById('s-pass2').value;

      if (!email || !name || !pass) { showErr('Please fill in all fields.'); return; }
      if (/\s/.test(name))          { showErr('Username cannot contain spaces.'); return; }
      if (name.length < 2)          { showErr('Username must be at least 2 characters.'); return; }
      if (pass.length < 6)          { showErr('Password must be at least 6 characters.'); return; }
      if (pass !== pass2)           { showErr('Passwords do not match.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Creating…';

      try {
        const cred  = await createUserWithEmailAndPassword(auth, email, pass);
        const uid   = cred.user.uid;
        const color = randomColor();
        const profile = { username: name, role: 'player', color };
        await set(ref(db, `users/${uid}`), profile);
        saveSession({ id: uid, ...profile });
        showDone();
      } catch (e) {
        if (e.code === 'auth/email-already-in-use') {
          showErr('That email is already registered.');
        } else if (e.code === 'auth/invalid-email') {
          showErr('Please enter a valid email address.');
        } else {
          showErr('Something went wrong: ' + e.message);
        }
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    });

    function showDone() {
      screenSetup.style.display = 'none';
      screenDone.style.display  = 'block';
      setTimeout(() => { window.location.href = 'pages/campaigns.html'; }, 1800);
    }

    function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
  </script>
</body>
</html>
