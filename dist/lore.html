> </main>  <div id="lore-modal" class="modal-overlay"> <div class="modal-box lore-edit-box"> <h2 id="lm-title">Add Lore</h2> <div class="form-row"> <label>Type</label> <div class="lore-type-selector" id="lm-type-selector"> <button type="button" class="lore-type-btn active" data-type="book"><iconify-icon icon="game-icons:open-book"></iconify-icon> Book</button> <button type="button" class="lore-type-btn" data-type="scroll"><iconify-icon icon="game-icons:scroll-unfurled"></iconify-icon> Scroll</button> </div> </div> <div class="form-row two-col"> <label>Title <span class="req">*</span> <input type="text" id="lm-name" placeholder="e.g. The Age of Embers"> </label> <label>Author <span class="dm-hint">(optional)</span> <input type="text" id="lm-writer" placeholder="e.g. Aldric the Sage"> </label> </div> <!-- Book: cover color --> <div id="lm-color-row" class="form-row"> <label>Cover Colour</label> <div class="color-swatch-row" id="lm-color-swatches"></div> </div> <!-- Book: pages editor --> <div id="lm-pages-section" class="lm-pages-section"> <div class="pages-header-row"> <span class="pages-section-label">Pages</span> <button type="button" id="lm-add-page-btn" class="dm-btn dm-btn-sm">+ Add Page</button> </div> <div id="lm-pages-list" class="lm-pages-list"></div> </div> <!-- Scroll: single content area --> <div id="lm-scroll-section" class="form-row" style="display:none"> <label>Content
